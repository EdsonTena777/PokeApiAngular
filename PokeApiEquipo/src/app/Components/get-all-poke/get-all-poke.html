<div class="container mt-4">
  <div class="row g-3">
    @for (pokemon of pokemones; track pokemon.idPokemon) {
      <div class="col-md-4">
        <div class="carta-volteada" (click)="pokemon.flipped = !pokemon.flipped" [class.flipped]="pokemon.flipped">
          <div class="carta-volteada-dentro">            
            <div class="carta-volteada-frente">
              <div class="tarjeta-pokedex">
                <div class="marco-pantalla">
                  <div class="datos-cabecera">
                    <span class="nombre">{{ pokemon.name | titlecase }}</span>
                    <span class="numero">no. {{ pokemon.idPokemon }}</span>
                  </div>
                  <div class="visor-pokemon">
                    <img [src]="'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + pokemon.idPokemon + '.png'"
                      [alt]="pokemon.name">
                  </div>
                  <div class="controles-inferiores">
                    <div class="genero">macho</div>
                    <button class="boton-favorito">favorito</button>
                    <div class="recargar">↺</div>
                  </div>
                </div>
                <div class="caja-descripcion">
                  <p>ID: {{ pokemon.idPokemon }}</p>
                </div>
              </div>
            </div>
            <div class="carta-volteada-atras">
              <div class="tarjeta-pokedex">
                <div class="marco-pantalla-atras">
                  <div class="datos-cabecera">
                    <span class="nombre">Info Extra</span>
                  </div>                
                  <div class="visor-pokemon" style="font-size: 0.7rem">
                    <p>Detalles rápidos de {{ pokemon.name }}</p>
                  </div>
                </div>
                <div class="caja-descripcion">
                  <p>Ver más detalles...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
